<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 감정일기 - 오늘 하루는 어땠나요?</title>
    <meta name="description" content="AI가 당신의 감정을 분석해주고 소통하는 인공지능 감정 일기 서비스입니다.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-blob blob-1"></div>
    <div class="background-blob blob-2"></div>
    
    <!-- [1] 인증 화면 (로그인/회원가입) -->
    <div id="auth-container" class="container">
        <header>
            <h1>AI 감정일기</h1>
            <p class="subtitle">오늘의 마음을 기록하기 위해 로그인해 주세요.</p>
        </header>

        <section class="auth-box">
            <div class="input-group">
                <input type="email" id="auth-email" placeholder="이메일 주소" required>
                <input type="password" id="auth-password" placeholder="비밀번호 (6자 이상)" required>
            </div>

            <div class="button-group auth-btn-group">
                <button id="login-btn" class="btn btn-primary">로그인</button>
                <button id="signup-btn" class="btn btn-secondary">회원가입</button>
            </div>

            <div class="divider">
                <span>또는</span>
            </div>

            <button id="google-login-btn" class="btn btn-google">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
                Google로 로그인
            </button>
        </section>
    </div>

    <!-- [2] 일기장 메인 화면 (로그인 후 보임) -->
    <div id="app-container" class="container hidden">
        <button id="theme-toggle" class="theme-toggle" aria-label="Toggle Dark Mode">
            <span class="icon">🌙</span>
        </button>
        <header>
            <h1 id="main-title">오늘 하루는 어땠나요?</h1>
            <div id="user-info" class="user-info">
                <span id="user-email"></span>
                <button id="logout-btn" class="logout-link">로그아웃</button>
            </div>
            <p class="subtitle">당신의 소중한 이야기를 AI와 나누어 보세요.</p>
        </header>

        <section class="diary-section">
            <div class="input-wrapper">
                <textarea id="diary-content" placeholder="이곳에 당신의 하루를 자유롭게 적어보세요..."></textarea>
            </div>
            
            <div class="button-group">
                <button id="voice-btn" class="btn btn-secondary">
                    <span class="icon">🎙️</span> 음성으로 입력하기
                </button>
                <button id="analyze-btn" class="btn btn-primary">
                    <span class="icon">✨</span> 분석하기
                </button>
            </div>
        </section>

        <section class="result-section">
            <h2 class="section-subtitle">AI의 답변</h2>
            <section id="ai-response-box" class="ai-box hidden">
            <p id="response-text" class="response-content"></p>
        </section>

        <!-- [New] 일기 히스토리 섹션 -->
        <hr class="separator">
        <section class="diary-history">
            <h2 class="history-title">📅 나의 일기 히스토리</h2>
            <div id="history-list" class="history-container">
                <!-- 여기에 카드가 동적으로 추가됩니다 -->
                <p class="empty-msg">아직 기록된 일기가 없어요. 오늘 하루를 들려주세요!</p>
            </div>
        </section>

        <!-- [New] 실시간 채팅 섹션 -->
        <hr class="separator">
        <section class="chat-section">
            <h2 class="chat-title">💬 실시간 채팅</h2>
            
            <!-- [New] 유저 프로필 섹션 -->
            <div id="user-profile" class="profile-section">
                <div class="avatar-wrapper">
                    <img id="user-avatar" src="https://api.dicebear.com/7.x/avataaars/svg?seed=placeholder" alt="프로필">
                    <input type="file" id="avatar-input" accept="image/*" class="hidden">
                    <div class="avatar-overlay">
                        <span class="icon">📸</span>
                    </div>
                </div>
                <button id="change-photo-btn" class="text-btn">사진 변경</button>
            </div>

            <div id="chat-messages" class="chat-messages-container">
                <!-- 여기에 채팅 메시지가 동적으로 추가됩니다 -->
                <p class="empty-msg">채팅방에 입장했습니다. 대화를 시작해보세요!</p>
            </div>
            <div class="chat-input-wrapper">
                <input type="file" id="chat-image-input" accept="image/*" class="hidden">
                <button id="attach-btn" class="icon-btn" title="이미지 첨부">
                    <span class="icon">📎</span>
                </button>
                <input type="text" id="chat-input" placeholder="메시지를 입력하세요..." autocomplete="off">
                <button id="chat-send-btn" class="icon-btn theme-primary" title="메시지 전송">
                    <span class="icon">🚀</span>
                </button>
            </div>
        </section>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
